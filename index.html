<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terimakasih My Family - HMIF</title>

<style>
/* ================= RESET ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
    color: white;
    background: black;
}

/* ================= BACKGROUND FOTO ================= */
.bg-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -3; /* Di paling belakang */
    overflow: hidden;
}

/* Layer 1: Background Blur & Sangat Gelap (Penuh Selayar) */
.bg-base {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("foto.jpg") center center no-repeat;
    background-size: cover;
    /* Blur dan Kegelapan ditingkatkan agar tidak terlalu terang */
    filter: blur(25px) brightness(0.2); 
    transform: scale(1.1); /* Sedikit zoom untuk menghilangkan pinggiran blur */
}

/* Layer 2: Foto Asli Utuh di Tengah (Hanya Aktif di HP) */
.bg-photo-main {
    display: none; /* Default tersembunyi untuk desktop */
}

/* ================= MODE HP (Anti-Kosong & Tidak Terang) ================= */
@media(max-width: 768px) {
    
    .bg-photo-main {
        display: block; /* Tampilkan di HP */
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        /* Atur tinggi maksimal agar ada jarak di atas/bawah untuk teks, 
           tapi fotonya sendiri tetap utuh */
        max-height: 65vh; 
        background: url("foto.jpg") center center no-repeat;
        background-size: contain; /* Foto utuh tanpa kepotong */
        transform: translate(-50%, -50%);
        z-index: -1;
        /* Efek bayangan halus */
        box-shadow: 0 0 50px rgba(0,0,0,0.6); 
    }
    
    /* Sedikit penyesuaian untuk desktop yang dikecilkan */
    .bg-base {
        filter: blur(25px) brightness(0.2);
    }
}

/* ================= STAR BACKGROUND (Canvas) ================= */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2; /* Di depan background foto, di belakang teks */
    opacity: 0.6; /* Membuat bintang tidak terlalu mencolok */
}

/* ================= CONTAINER TEKS ================= */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    /* Ubah ke flex-end di HP agar teks ada di area bawah yang lebih gelap */
    align-items: center; 
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
}

@media(max-width: 768px) {
    .container {
        align-items: flex-end; /* Teks di bawah foto */
        padding-bottom: 50px; /* Jarak dari bawah layar */
    }
}

/* ================= TEXT ================= */
#text {
    max-width: 800px;
    font-size: 26px;
    line-height: 1.6;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    /* Glow/bayangan teks untuk keterbacaan ekstra */
    text-shadow: 0 0 15px rgba(0,0,0,1), 2px 2px 3px rgba(0,0,0,1);
    margin-bottom: 20px;
}

@media(max-width: 768px) {
    #text {
        font-size: 18px;
        background: rgba(0,0,0,0.5); /* Background teks semi-transparan */
        padding: 15px;
        border-radius: 10px;
    }
}

/* ================= BUTTON ================= */
button {
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: #2563eb;
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
    transition: 0.3s;
    position: relative;
    z-index: 2;
}

button:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}

#nextBtn {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.5);
    color: white;
}
</style>
</head>

<body>

<div class="bg-wrapper">
    <div class="bg-base"></div> <div class="bg-photo-main"></div> </div>

<canvas id="stars"></canvas>

<div class="container">
    <div>
        <h1 id="text"></h1>
        
        <button id="startBtn" onclick="startIntro()">
            Klik untuk Memulai
        </button>

        <button id="nextBtn" onclick="nextManual()" style="display:none;">
            Lanjut →
        </button>
    </div>
</div>

<audio id="music">
    <source src="musik.mp3" type="audio/mp3">
</audio>

<script>
/* ================= DATA TEKS ================= */
const introSlides = [
    "Mungkin ini terdengar sedikit lebay…",
    "Tapi setiap perjalanan pasti punya akhirnya.",
    "Dan setiap akhir selalu menyimpan cerita."
];

const autoSlides = [
    "Assalamu’alaikum Warahmatullahi Wabarakatuh 💙",
    "Teman-teman pengurus keluarga besar HMIF periode 2025/2026 yang saya banggakan 🤗",
    "Hari ini menjadi momen yang sangat berarti bagi saya.",
    "Perjalanan yang kita mulai bersama dengan niat belajar, berproses, dan berjuang.",
    "Kini sampai pada akhir amanah saya sebagai Ketua HMIF.",
    "Perjalanan ini tidak selalu mudah.",
    "Kita pernah kekurangan SDM.",
    "Menghadapi banyak tantangan kegiatan.",
    "Menyatukan banyak pikiran.",
    "Dan melewati rasa lelah yang tidak semua orang lihat.",
    "Tapi dari semua itu…",
    "Saya melihat sesuatu yang paling berharga.",
    "Kebersamaan.",
    "Dan teman-teman yang tetap memilih bertahan untuk HMIF.",
    "Terima kasih karena sudah berjalan bersama saya.",
    "Membersamai setiap proses.",
    "Dan memberi warna dalam kepengurusan ini.",
    "Sekecil apa pun kontribusi kalian…",
    "Semuanya adalah bagian dari sejarah HMIF.",
    "Saya menyadari masih banyak kekurangan.",
    "Jika ada kata yang kurang berkenan.",
    "Keputusan yang belum tepat.",
    "Atau harapan yang belum terwujud…",
    "Dengan tulus saya memohon maaf.",
    "Hari ini amanah saya sebagai ketua selesai.",
    "Tapi saya tidak pernah berhenti menjadi bagian dari keluarga HMIF.",
    "Jabatan boleh selesai.",
    "Namun rasa memiliki semoga selalu kita jaga bersama.",
    "Kepada pemimpin HMIF berikutnya, selamat melanjutkan perjuangan.",
    "Pimpinlah dengan hati.",
    "Rangkul semua anggota.",
    "Dan jaga HMIF tetap hidup 💙",
    "Terima kasih atas setiap cerita.",
    "Perjuangan.",
    "Tawa.",
    "Dan pelajaran yang kita lalui bersama.",
    "Saya bangga pernah menjadi bagian dari perjalanan ini.",
    "Dan lebih bangga pernah memimpin orang-orang hebat seperti kalian.",
    "I love you all 🥰",
    "Wassalamu’alaikum Warahmatullahi Wabarakatuh 👋",
    "SEE YOU AGAIN MY FAMILY 💙"
];

let introIndex = 0;
let autoIndex = 0;

/* ================= FUNGSI JALAN ================= */
function startIntro() {
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "inline-block";
    showText(introSlides[introIndex]);
}

function nextManual() {
    introIndex++;
    if(introIndex < introSlides.length) {
        showText(introSlides[introIndex]);
    } else {
        document.getElementById("nextBtn").style.display = "none";
        startAutoSlides();
    }
}

function startAutoSlides() {
    const music = document.getElementById("music");
    // Penanganan error jika autoplay diblokir browser
    music.play().catch(e => {
        console.log("Audio play blocked, but story continues.", e);
        // Bisa tambahkan tombol 'Play Music' manual di sini jika perlu
    });
    nextAuto();
}

function nextAuto() {
    if(autoIndex < autoSlides.length) {
        showText(autoSlides[autoIndex]);
        autoIndex++;
        // Waktu ganti teks sedikit dipercepat agar tidak terlalu membosankan
        setTimeout(nextAuto, 4200); 
    }
}

function showText(message) {
    const textEl = document.getElementById("text");
    textEl.style.opacity = 0;
    setTimeout(() => {
        textEl.innerHTML = message;
        textEl.style.opacity = 1;
    }, 500); // Waktu transisi sedikit lebih cepat
}

/* ================= EFEK BINTANG ================= */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let stars = [];
for(let i = 0; i < 150; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5, // Bintang sedikit lebih kecil
        s: Math.random() * 0.4 + 0.1 // Kecepatan gerak lambat
    });
}

function animateStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; // Bintang agak transparan
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
        s.y += s.s;
        if(s.y > canvas.height) s.y = 0;
    });
    requestAnimationFrame(animateStars);
}
animateStars();
</script>

</body>
</html>
